{% extends "base.html" %}
{% block title %}Nouveau patient - Clinic Local{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">Nouveau patient</h1>
<form method="post" action="/patients" class="grid max-w-2xl gap-4">
  {{ csrf_input(request) }}
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium">Prénom</label>
      <input name="first_name" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm font-medium">Nom</label>
      <input name="last_name" required class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
    </div>
  </div>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium">Email</label>
      <input name="email" type="email" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm font-medium">Téléphone</label>
      <input name="phone" class="mt-1 w-full rounded border border-slate-300 px-3 py-2" />
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium">Notes cliniques</label>
    <textarea name="notes" rows="4" class="mt-1 w-full rounded border border-slate-300 px-3 py-2"></textarea>
  </div>
  <label class="inline-flex items-center gap-2 text-sm text-slate-600">
    <input type="checkbox" name="consent_rgpd" value="1" /> Consentement RGPD obtenu
  </label>
  <button class="mt-2 w-fit rounded bg-sky-600 px-4 py-2 text-white">Enregistrer</button>
</form>
{% endblock %}
