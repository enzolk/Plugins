<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion - Clinic Local</title>
    <link rel="stylesheet" href="/static/css/tailwind.css" />
  </head>
  <body class="min-h-screen bg-slate-100 flex items-center justify-center">
    <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-lg">
      <h1 class="text-xl font-semibold mb-6">Connexion</h1>
      {% if error %}
      <div class="mb-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</div>
      {% endif %}
      <form method="post" class="space-y-4">
        {{ csrf_input(request) }}
        <div>
          <label class="mb-1 block text-sm font-medium">Email</label>
          <input type="email" name="email" required class="w-full rounded border border-slate-300 px-3 py-2" />
        </div>
        <div>
          <label class="mb-1 block text-sm font-medium">Mot de passe</label>
          <input type="password" name="password" required class="w-full rounded border border-slate-300 px-3 py-2" />
        </div>
        <button type="submit" class="w-full rounded bg-sky-600 px-4 py-2 font-semibold text-white">Se connecter</button>
      </form>
    </div>
  </body>
</html>
